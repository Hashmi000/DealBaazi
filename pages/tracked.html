<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tracked Items — DealBaazi</title>
  <link rel="stylesheet" href="/public/css/design-system.css"/>
  <link rel="stylesheet" href="/public/css/dashboard.css"/>
</head>
<body class="dashboard-page">

<!-- ══ NAVBAR ══════════════════════════════════════ -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="nav-logo">
      <div class="nav-logo-icon">⚡</div>
      DealBaazi
    </a>

    <div class="nav-searchbar">
      <input type="text" id="nav-search-input" placeholder="Search products, brands, deals…"
             onkeydown="if(event.key==='Enter') triggerSearch()" autocomplete="off"/>
      <button class="nav-search-btn" onclick="triggerSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <div class="search-suggestions-wrap" id="nav-suggestions"></div>
    </div>

    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="location.href='wishlist.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Wishlist
      </button>
      <button class="nav-icon-btn" onclick="location.href='alerts.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Alerts
      </button>
      <div style="position:relative">
        <button class="nav-avatar-btn" id="nav-avatar" onclick="toggleDrop()" aria-label="Profile">U</button>
        <div class="nav-dropdown" id="nav-drop">
          <a href="profile.html">👤 My Profile</a>
          <a href="alerts.html">🔔 Price Alerts</a>
          <a href="tracked.html">📦 Tracked Items</a>
          <a href="wishlist.html">♡ Wishlist</a>
          <hr/>
          <a href="#" onclick="logout()">↪ Sign Out</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="page-content" style="padding-top: 20px">
  <div style="display: grid; grid-template-columns: 240px 1fr; gap: 40px; align-items: start;">
    
    <!-- Unified Sidebar -->
    <aside style="position: sticky; top: 100px;">
      <a href="profile.html" style="display:flex; align-items:center; gap:12px; padding:12px 18px; border-radius:12px; color:var(--t2); transition:var(--ease); margin-bottom:8px;" onmouseover="this.style.background='var(--bg-raised)'" onmouseout="this.style.background='transparent'">👤 My Profile</a>
      <a href="alerts.html" style="display:flex; align-items:center; gap:12px; padding:12px 18px; border-radius:12px; color:var(--t2); transition:var(--ease); margin-bottom:8px;" onmouseover="this.style.background='var(--bg-raised)'" onmouseout="this.style.background='transparent'">🔔 Price Alerts</a>
      <a href="tracked.html" style="display:flex; align-items:center; gap:12px; padding:12px 18px; border-radius:12px; background:var(--em-dim); color:var(--em); font-weight:700; margin-bottom:8px;">📦 Tracked Items</a>
      <a href="wishlist.html" style="display:flex; align-items:center; gap:12px; padding:12px 18px; border-radius:12px; color:var(--t2); transition:var(--ease);" onmouseover="this.style.background='var(--bg-raised)'" onmouseout="this.style.background='transparent'">♡ Wishlist</a>
    </aside>

    <!-- Tracked Area -->
    <main>
      <div class="section-head">
        <h1 class="section-title">📦 Your Tracked Items</h1>
      </div>
      
      <div class="summary-strip" style="background:var(--bg-card); display:flex; gap:20px; padding:24px; border-radius:var(--r-xl); border:1px solid var(--line-hi); margin-bottom:30px">
        <div style="flex:1">
          <span style="color:var(--t3); display:block; font-size:0.75rem; text-transform:uppercase; margin-bottom:4px">Watching</span>
          <span id="tracked-total" style="font-size:1.5rem; font-weight:700">0 Products</span>
        </div>
        <div style="flex:1">
          <span style="color:var(--t3); display:block; font-size:0.75rem; text-transform:uppercase; margin-bottom:4px">Potential Savings</span>
          <span id="tracked-avg-drop" style="font-size:1.5rem; font-weight:700; color:var(--em)">₹0</span>
        </div>
      </div>

      <div id="tracked-grid" class="product-grid">
        <!-- Products will be injected by tracked.js -->
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <h3>No items tracked yet</h3>
          <p>Search for products and click "Track Price" to see them here.</p>
        </div>
      </div>
    </main>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/public/js/auth.js"></script>
<script src="/public/js/autocomplete.js"></script>
<script src="/public/js/search.js"></script>
<script src="/public/js/tracked.js"></script>
</body>
</html>
